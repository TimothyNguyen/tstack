name: test-anti-patterns
type: skill
status: stable
version: 1.0.0
owner: orchestrator
description: >
  Audits an existing test file or suite in any language for anti-patterns and quality issues — produces a
  severity-ranked report (Critical/Warning/Info). INVOKE whenever asked to audit or review tests, find what's wrong with
  a suite, judge whether tests are any good, or check tests for: tests that pass but verify nothing, no/missing
  assertions, swallowed exceptions, self-comparing/self-referential/ tautological assertions (output==input on
  round-trip/identity ops), coverage-touching tests (every method called but nothing verified), broad exceptions, flaky
  or order-dependent tests (Thread.Sleep, DateTime.Now, time.sleep, shared state, reflection coupling), duplicated
  tests, magic values — in .NET, Python/pytest, TS/Jest, Java, Go, Ruby or C++. DO NOT USE FOR: writing new tests (use
  code-testing-agent); running tests (use run-tests); migration; assertion-diversity metrics (use assertion-quality);
  coverage/CRAP metrics (use coverage-analysis); the testsmells.org academic catalog (use test-smell-detection).
dependencies:
  skills: []
  adapters: []
  tools: []
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
documentation:
  readme: true
  spec: true
  examples_min: 2
used_by: []
