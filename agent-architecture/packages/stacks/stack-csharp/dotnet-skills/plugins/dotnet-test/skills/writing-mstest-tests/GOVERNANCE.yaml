name: writing-mstest-tests
type: skill
status: stable
version: 1.0.0
owner: orchestrator
description: >
  Write new MSTest unit tests and fix existing MSTest code using MSTest 3.x/4.x modern APIs and best practices. USE FOR:
  write or create MSTest unit tests, fix or modernize MSTest assertions, better MSTest assertion than Assert.IsTrue,
  replace hard cast with MSTest type assertion, MSTest assertion APIs (IsInstanceOfType, Contains, ContainsSingle,
  HasCount, IsEmpty, IsNotEmpty, DoesNotContain, StartsWith, EndsWith, MatchesRegex, IsGreaterThan, IsInRange, IsNull),
  fix swapped Assert.AreEqual arguments, replace ExpectedException with Assert.Throws, data-driven tests (DataRow,
  DynamicData, ValueTuples), test lifecycle (sealed classes, TestInitialize, TestCleanup), async tests and cancellation
  tokens, test parallelization (Parallelize / DoNotParallelize), MSTest.Sdk project setup. DO NOT USE FOR: broad test
  quality audits (use test-anti-patterns), running tests (use run-tests), MSTest version migration (use
  migrate-mstest-v1v2-to-v3 or migrate-mstest-v3-to-v4), xUnit/NUnit/TUnit, or non-.NET languages.
dependencies:
  skills: []
  adapters: []
  tools: []
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
documentation:
  readme: true
  spec: true
  examples_min: 2
used_by: []
governance_version: '1.0'
