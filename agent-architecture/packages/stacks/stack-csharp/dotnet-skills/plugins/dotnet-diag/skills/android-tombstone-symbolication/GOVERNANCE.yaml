name: android-tombstone-symbolication
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Symbolicate the .NET runtime frames in an Android tombstone file. Extracts BuildIds and PC offsets from the native
  backtrace, downloads debug symbols from the Microsoft symbol server, and runs llvm-symbolizer to produce function
  names with source file and line numbers. USE FOR triaging a .NET MAUI or Mono Android app crash from a tombstone,
  resolving native backtrace frames in libmonosgen-2.0.so or libcoreclr.so to .NET runtime source code, or investigating
  SIGABRT, SIGSEGV, or other native signals originating from the .NET runtime on Android. DO NOT USE FOR pure
  Java/Kotlin crashes, managed .NET exceptions that are already captured in logcat, or iOS crash logs. INVOKES
  Symbolicate-Tombstone.ps1 script, llvm-symbolizer, Microsoft symbol server.
