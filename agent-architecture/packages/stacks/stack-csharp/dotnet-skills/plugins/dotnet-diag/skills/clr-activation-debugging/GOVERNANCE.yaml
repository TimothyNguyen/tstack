name: clr-activation-debugging
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Diagnoses .NET Framework CLR activation issues using CLR activation logs (CLRLoad logs) produced by mscoree.dll. Use
  when: the shim picks the wrong runtime, fails to load any runtime, shows unexpected .NET 3.5 Feature-on-Demand (FOD)
  dialogs, unexpectedly does NOT show FOD dialogs, loads both v2 and v4 into the same process causing failures, or any
  time someone is wondering "what is happening with .NET Framework activation?"
