name: item-management
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Patterns for managing MSBuild item groups: Include/Remove/Update semantics, item metadata, batching with %(Metadata),
  transforms, per-item filtering, and cross-product batching pitfalls. Only activate in MSBuild/.NET build context. USE
  FOR: diagnosing and fixing item group anti-patterns in .csproj files, reviewing item management for correctness,
  fixing CS2002 duplicate file warnings from SDK globbing, fixing targets that run more times than expected due to
  cross-product batching, fixing Include vs Update misuse on SDK-globbed items, fixing FileWrites registration for
  generated file clean support, moving generated files to IntermediateOutputPath. DO NOT USE FOR: target chain
  architecture (use target-authoring), property patterns (use property-patterns), incrementality (use
  incremental-build), general anti-patterns (use msbuild-antipatterns), non-MSBuild build systems.
