name: build-parallelism
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Guide for optimizing MSBuild build parallelism and multi-project scheduling. Only activate in MSBuild/.NET build
  context. USE FOR: builds not utilizing all CPU cores, speeding up multi-project solutions, evaluating graph build mode
  (/graph), build time not improving with -m flag, understanding project dependency topology. Note: /maxcpucount default
  is 1 (sequential) — always use -m for parallel builds. Covers /maxcpucount, graph build for better scheduling and
  isolation, BuildInParallel on MSBuild task, reducing unnecessary ProjectReferences, solution filters (.slnf) for
  building subsets. DO NOT USE FOR: single-project builds, incremental build issues (use incremental-build), compilation
  slowness within a project (use build-perf-diagnostics), non-MSBuild build systems. INVOKES: binlog MCP server tools
  (expensive_projects, expensive_targets, project_target_times); falls back to dotnet build -m, dotnet build /graph,
  binlog replay + grep.
