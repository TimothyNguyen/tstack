name: resolve-project-references
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Guide for interpreting ResolveProjectReferences time in MSBuild performance summaries. Only activate in MSBuild/.NET
  build context. Activate when ResolveProjectReferences appears as the most expensive target and developers are trying
  to optimize it directly. Explains that the reported time includes wait time for dependent project builds and is
  misleading. Guides users to focus on task self-time instead. Do not activate for general build performance -- use
  build-perf-diagnostics instead.
