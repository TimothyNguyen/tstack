name: directory-build-organization
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Guide for organizing MSBuild infrastructure with Directory.Build.props, Directory.Build.targets,
  Directory.Packages.props, and Directory.Build.rsp. Only activate in MSBuild/.NET build context. USE FOR: structuring
  multi-project repos, centralizing build settings, implementing NuGet Central Package Management (CPM) with
  ManagePackageVersionsCentrally, consolidating duplicated properties across .csproj files, setting up multi-level
  Directory.Build hierarchy with GetPathOfFileAbove, understanding evaluation order (Directory.Build.props → SDK .props
  → .csproj → SDK .targets → Directory.Build.targets). Critical pitfall: $(TargetFramework) conditions in .props
  silently fail for single-targeting projects — must use .targets. DO NOT USE FOR: non-MSBuild build systems, migrating
  legacy projects to SDK-style (use msbuild-modernization), single-project solutions with no shared settings. INVOKES:
  no tools — pure knowledge skill.
