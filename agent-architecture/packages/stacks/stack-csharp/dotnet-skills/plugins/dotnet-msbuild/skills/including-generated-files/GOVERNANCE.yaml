name: including-generated-files
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Fix MSBuild targets that generate files during the build but those files are missing from compilation or output. Only
  activate in MSBuild/.NET build context. USE FOR: generated source files not compiling (CS0246 for a type that should
  exist), custom build tasks that create files but they are invisible to subsequent targets, globs not capturing
  build-generated files because they expand at evaluation time before execution creates them, ensuring generated files
  are cleaned by the Clean target. Covers correct BeforeTargets timing (CoreCompile, BeforeBuild, AssignTargetPaths),
  adding to Compile/FileWrites item groups, using $(IntermediateOutputPath) instead of hardcoded obj/ paths. DO NOT USE
  FOR: C# source generators that already work via the Roslyn pipeline, T4 design-time generation that runs in Visual
  Studio, non-MSBuild build systems. INVOKES: no tools — pure knowledge skill.
