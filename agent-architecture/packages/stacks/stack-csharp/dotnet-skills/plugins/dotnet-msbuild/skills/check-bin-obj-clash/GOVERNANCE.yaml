name: check-bin-obj-clash
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Detects MSBuild projects with conflicting OutputPath or IntermediateOutputPath. Only activate in MSBuild/.NET build
  context. USE FOR: builds failing with 'Cannot create a file when that file already exists', 'The process cannot access
  the file because it is being used by another process', intermittent build failures that succeed on retry, missing
  outputs in multi-project builds, multi-targeting builds where project.assets.json conflicts. Diagnoses when multiple
  projects or TFMs write to the same bin/obj directories due to shared OutputPath, missing
  AppendTargetFrameworkToOutputPath, or extra global properties like PublishReadyToRun creating redundant evaluations.
  DO NOT USE FOR: file access errors unrelated to MSBuild (OS-level locking), single-project single-TFM builds,
  non-MSBuild build systems. INVOKES: binlog MCP server tools (overview, projects, evaluations, properties,
  double_writes); falls back to dotnet msbuild binlog replay + grep when the MCP is unavailable.
