name: mcp-csharp-publish
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Publish and deploy C# MCP servers. Covers NuGet packaging for stdio servers, Docker containerization for HTTP servers,
  Azure Container Apps and App Service deployment, and publishing to the official MCP Registry. USE FOR: packaging stdio
  MCP servers as NuGet tools, creating Dockerfiles for HTTP MCP servers, deploying to Azure Container Apps or App
  Service, publishing to the MCP Registry at registry.modelcontextprotocol.io, configuring server.json for MCP package
  metadata, setting up CI/CD for MCP server publishing. DO NOT USE FOR: publishing general NuGet libraries (not
  MCP-specific), general Docker guidance unrelated to MCP, creating new servers (use mcp-csharp-create), debugging (use
  mcp-csharp-debug), writing tests (use mcp-csharp-test).
