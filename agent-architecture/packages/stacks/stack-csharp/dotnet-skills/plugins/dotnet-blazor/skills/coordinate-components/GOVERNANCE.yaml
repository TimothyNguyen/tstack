name: coordinate-components
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Share state between components that don't have a direct parent-child parameter relationship, using cascading values,
  scoped services with change events, or CascadingValueSource via DI. USE WHEN the user needs a CascadingParameter or
  CascadingValue that works across render mode boundaries, a shopping cart or notification count accessible from
  multiple pages, a theme or user preference cascaded app-wide, or when components in different parts of the tree must
  react when shared data changes. Also USE WHEN cascading values aren't reaching interactive children in per-page
  interactivity mode, or when the user needs to understand scoped vs singleton service lifetime for state on Blazor
  Server. DO NOT USE for direct parent-child parameter passing or EventCallback (see author-component), for persisting
  state across prerender-to-interactive transitions (see support-prerendering), or for service abstractions for data
  fetching in Auto/WebAssembly (see fetch-and-send-data).
