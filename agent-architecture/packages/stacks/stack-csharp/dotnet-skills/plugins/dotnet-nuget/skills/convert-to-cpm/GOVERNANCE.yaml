name: convert-to-cpm
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Convert .NET projects and solutions (.sln, .slnx) to NuGet Central Package Management (CPM) using
  Directory.Packages.props. USE FOR: converting to CPM, centralizing or aligning NuGet package versions across multiple
  projects, inlining MSBuild version properties from Directory.Build.props into Directory.Packages.props, resolving
  version conflicts or mismatches across a solution or repository, updating or bumping or syncing package versions
  across projects. Also activate when packages are out of sync, drifting, or inconsistent -- even without the user
  mentioning CPM. Provides baseline build capture, version conflict resolution, build validation with binlog comparison,
  and a structured post-conversion report. DO NOT USE FOR: packages.config projects (must migrate to PackageReference
  first) or repositories that already have CPM fully enabled.
