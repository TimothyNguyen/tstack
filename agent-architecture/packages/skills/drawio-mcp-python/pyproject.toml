[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "drawio-mcp"
version = "2.0.0"
description = "Official draw.io MCP server for LLMs - Open diagrams in draw.io editor"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "Apache-2.0" }
authors = [{ name = "JGraph Ltd" }]
keywords = ["mcp", "drawio", "draw.io", "diagrams", "mermaid", "csv", "xml", "llm", "claude", "anthropic"]

dependencies = [
    "fastmcp>=0.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[project.scripts]
drawio-mcp = "drawio_mcp.server:main"

[tool.setuptools]
packages = ["drawio_mcp"]

[tool.setuptools.package-data]
drawio_mcp = ["*.md"]
