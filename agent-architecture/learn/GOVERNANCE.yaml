name: learn
type: skill
status: beta
version: 0.1.1
owner: orchestrator
description: |
  Knowledge capture workflow. Extracts Q&A flashcards from agent session context.
  Writes to local learn-out/ folder as JSON. Exports Quizlet-compatible CSV via
  learn/export.py. Optionally pushes cards to Confluence via atlassian-docs.
  Invoke via /learn at end of any session.
dependencies:
  skills:
    - design-review
    - migration-review
    - qa
    - release
    - security-review
    - seniorswe-concise
    - spec
    - stack-aws
    - stack-databricks
    - subagent-orchestrator
  adapters: []
  tools:
    - docker
    - git
    - python
  mcps: []
testing:
  coverage_target: 80
  types:
    - unit
    - integration
documentation:
  readme: true
  spec: true
  examples_min: 2
used_by: []
governance_version: '1.0'
last_reviewed: '2026-06-28'
