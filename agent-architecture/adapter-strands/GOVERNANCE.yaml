name: adapter-strands
type: skill
status: stable
version: 0.1.1
owner: orchestrator
description: |
  Optional Strands adapter boundary for composing skills and tools with
  privacy-first policy gates and no core runtime dependency.
dependencies:
  skills:
    - stack-aws
    - subagent-orchestrator
  adapters:
    - adapter-owned
    - adapter-strands
  tools:
    - docker
    - git
    - python
    - terraform
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
    - contract
documentation:
  readme: true
  spec: true
  examples_min: 3
used_by:
  - adapter-strands
governance_version: '1.0'
last_reviewed: '2026-06-28'
adapter_metadata:
  capabilities:
    core_features: []
  security_model:
    default_access: default-deny
    policy_gated:
      - credentials
      - network_egress
  inputs: {}
  outputs: {}
integration:
  pre_requirements:
    adapter_available: false
  registration:
    adapter_registry: true
quality:
  test_coverage: 85
  documentation_completeness: 90
  security_review_date: '2026-06-27'
  performance_tested: true
  error_cases_documented: true
exceptions: []
deprecation: null
