name: databricks-app-design
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Design the UX of Databricks data apps — dashboards, KPI pages, reports, charts, tables, and Genie/chat data assistants
  — mapped to concrete AppKit components. Use when BUILDING or reviewing any UI that displays data or answers data
  questions: choosing genre, layout, charts, KPIs, semantic color, required states (loading/empty/error), IBCS notation,
  and AI-result trust (showing generated SQL/sources for Genie/chat). NOT for authoring managed AI/BI (Lakeview)
  dashboards (→ databricks-aibi-dashboards), non-data frontend (forms, settings, auth, marketing), or
  scaffolding/build/deploy (→ databricks-apps). Complements databricks-apps; use it alongside whenever the app has a
  dashboard, chart, table, KPI, report, or Genie/chat/AI surface.
