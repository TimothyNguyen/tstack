name: exp-test-maintainability
type: skill
status: stable
version: 1.0.0
owner: orchestrator
description: >-
  Detects duplicate boilerplate, copy-paste tests, and structural maintainability issues across .NET test suites. Use
  when the user asks to reduce repetition, consolidate similar test methods, convert copy-paste tests to data-driven
  parameterized tests, suggest a better test structure, or identify refactoring opportunities. Identifies repeated
  construction, assertion patterns, copy-paste methods convertible to DataRow/Theory/TestCase, redundant setup/teardown,
  and shared infrastructure. Produces an analysis report with concrete before/after suggestions. Works with MSTest,
  xUnit, NUnit, and TUnit. DO NOT USE FOR: writing new tests (use writing-mstest-tests), reviewing test quality or
  anti-patterns (use test-anti-patterns), or deep mock auditing (use exp-mock-usage-analysis).
dependencies:
  skills: []
  adapters: []
  tools: []
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
documentation:
  readme: true
  spec: true
  examples_min: 2
used_by: []
governance_version: '1.0'
last_reviewed: '2026-06-28'
