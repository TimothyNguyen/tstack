name: exp-mock-usage-analysis
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Audits .NET test mock usage by tracing each mock setup through the production code's execution path to find dead,
  unreachable, redundant, or replaceable mocks. Use when the user asks to audit mock usage, find unused or unnecessary
  mock setups, check if mocks are needed, reduce mock duplication or over-mocking, simplify test setup, or review
  whether mock configurations like ILogger/IOptions should use real implementations instead. Supports Moq, NSubstitute,
  and FakeItEasy.
