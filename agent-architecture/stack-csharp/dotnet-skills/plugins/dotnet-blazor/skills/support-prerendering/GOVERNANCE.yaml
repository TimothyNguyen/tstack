name: support-prerendering
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Make interactive Blazor components work correctly with prerendering. USE FOR fixing duplicate data loads, UI flicker
  during prerender-to-interactive handoff, null references during prerender, persisting state across prerender,
  disabling prerendering, excluding pages from interactive routing, or detecting whether a component is currently
  prerendering. DO NOT USE for choosing which render mode to use (see create-blazor-project) or general component
  authoring (see author-component).
