name: create-blazor-project
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Create a new ASP.NET Core web application or web site using Blazor. USE FOR: creating a new Blazor web app,
  scaffolding a new web project, starting a new web site, choosing render modes (Static SSR, Interactive Server,
  Interactive WebAssembly, Auto), running dotnet new blazor with the right options, setting up initial project
  structure. DO NOT USE FOR: adding features to existing projects, changing how an existing app renders, or component
  authoring (use author-component).
