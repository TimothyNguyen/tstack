name: collect-user-input
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Build forms, validate data, and react to user input in Blazor. USE FOR adding forms, search boxes, filter panels,
  inline editing, data-entry UI, file uploads, validation (annotations or custom), handling form submissions, and
  binding input controls. Covers EditForm, built-in input components, DataAnnotationsValidator, custom validation, SSR
  form patterns (SupplyParameterFromForm, FormName, AntiforgeryToken, Enhance), and @bind for simple interactive
  controls. DO NOT USE for project scaffolding (see create-blazor-project) or prerendering issues (see
  support-prerendering).
