name: dump-collect
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Configure and collect crash dumps for modern .NET applications. USE FOR: enabling automatic crash dumps for CoreCLR or
  NativeAOT, capturing dumps from running .NET processes, setting up dump collection in Docker or Kubernetes, using
  dotnet-dump collect or createdump. DO NOT USE FOR: analyzing or debugging dumps, post-mortem investigation with
  lldb/windbg/dotnet-dump analyze, profiling or tracing, or for .NET Framework processes.
