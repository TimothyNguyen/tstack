name: maui-collectionview
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Guidance for implementing CollectionView in .NET MAUI apps — data display, layouts (list & grid), selection, grouping,
  scrolling, empty views, templates, incremental loading, swipe actions, and pull-to-refresh. USE FOR: "CollectionView",
  "list view", "grid layout", "data template", "item template", "grouping", "pull to refresh", "incremental loading",
  "swipe actions", "empty view", "selection mode", "scroll to item", displaying scrollable data, replacing ListView. DO
  NOT USE FOR: simple static layouts without scrollable data (use Grid or StackLayout), map pin lists (use
  Microsoft.Maui.Controls.Maps), table-based data entry forms, or non-MAUI list controls.
