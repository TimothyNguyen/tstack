name: maui-theming
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Guide for theming .NET MAUI apps — light/dark mode via AppThemeBinding, ResourceDictionary theme switching,
  DynamicResource bindings, system theme detection, and user theme preferences. Use when: "dark mode", "light mode",
  "theming", "AppThemeBinding", "theme switching", "ResourceDictionary theme", "dynamic resources", "system theme
  detection", "color scheme", "app theme", "DynamicResource". Do not use for: localization or language switching (see
  .NET MAUI localization documentation), accessibility visual adjustments (see .NET MAUI accessibility documentation),
  app icons or splash screens (see .NET MAUI app icons documentation), or Bootstrap-style class theming (see
  Plugin.Maui.BootstrapTheme NuGet package).
