name: maui-safe-area
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  .NET MAUI safe area and edge-to-edge layout guidance for .NET 10+. Covers the new SafeAreaEdges property,
  SafeAreaRegions enum, per-edge control, keyboard avoidance, Blazor Hybrid CSS safe areas, migration from legacy
  iOS-only APIs, and platform-specific behavior for Android, iOS, and Mac Catalyst. USE FOR: "safe area",
  "edge-to-edge", "SafeAreaEdges", "SafeAreaRegions", "keyboard avoidance", "notch insets", "status bar overlap", "iOS
  safe area", "Android edge-to-edge", "content behind status bar", "UseSafeArea migration", "soft input keyboard",
  "IgnoreSafeArea replacement". DO NOT USE FOR: general layout or grid design (use Grid and StackLayout), app lifecycle
  handling (use maui-app-lifecycle), theming or styling (use maui-theming), or Shell navigation structure.
