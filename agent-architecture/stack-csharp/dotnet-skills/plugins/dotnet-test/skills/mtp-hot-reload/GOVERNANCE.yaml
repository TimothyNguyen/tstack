name: mtp-hot-reload
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Suggests using Microsoft Testing Platform (MTP) hot reload to iterate fixes on failing tests without rebuilding. Use
  when user says "hot reload tests", "iterate on test fix", "run tests without rebuilding", "speed up test loop", "fix
  test faster", or needs to set up MTP hot reload to rapidly iterate on test failures. Covers setup (NuGet package,
  environment variable, launchSettings.json) and the iterative workflow for fixing tests. DO NOT USE FOR: writing test
  code, diagnosing test failures, running tests normally with dotnet test (use run-tests), applying test filters,
  producing TRX reports, CI/CD pipeline configuration, or Visual Studio Test Explorer hot reload (which is a different
  feature).
