name: code-testing-agent
type: skill
status: stable
version: 1.0.0
owner: orchestrator
description: >-
  Generates and writes new unit tests for any programming language — scaffolds .NET test projects, pytest suites,
  Vitest/Jest suites, Go test files, and JUnit suites, and configures coverage tooling (coverlet, pytest-cov,
  @vitest/coverage-v8) as part of test generation. Use when asked to generate tests, generate pytest tests, generate
  Vitest tests, write unit tests, add tests, improve coverage, comprehensive tests, or scaffold a new test project or
  suite for an app, service, library, REST API, blueprint, or package — including project-wide, multi-file test
  generation across services, repositories, routes, and modules. Supports C#/.NET, Python (pytest, Flask/Django),
  TypeScript/JavaScript (Vitest, Jest, Mocha), Go, Rust, Java (JUnit). Runs a research, planning, and implementation
  pipeline so tests compile and pass. DO NOT USE FOR: running existing tests (use run-tests); analyzing existing
  coverage reports (use coverage-analysis or crap-score); MSTest modernization (use writing-mstest-tests).
dependencies:
  skills: []
  adapters: []
  tools: []
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
documentation:
  readme: true
  spec: true
  examples_min: 2
used_by: []
governance_version: '1.0'
