name: assertion-quality
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Analyzes the variety and depth of assertions across test suites in any language. Use when the user asks to evaluate
  assertion quality, find shallow testing, identify assertion-free tests (no assertions or only trivial ones like
  Assert.IsNotNull / toBeTruthy() / assert x is not None), flag self-referential or tautological assertions (output
  equals input on identity/round-trip operations), measure assertion coverage diversity, or audit whether tests verify
  different facets of correctness. Produces metrics and actionable recommendations. Polyglot: .NET (MSTest/xUnit/NUnit),
  Python (pytest), TS/JS (Jest/Vitest), Java, Go, Ruby, Rust, Swift, Kotlin, PowerShell (Pester), C++. DO NOT USE FOR:
  writing new tests (use code-testing-agent, or writing-mstest-tests for MSTest), anti-patterns like flakiness or
  duplication, or a general severity-ranked anti-pattern audit even when focused on self-referential / tautological
  assertions and not asking for assertion-diversity metrics (use test-anti-patterns); fixing assertions.
