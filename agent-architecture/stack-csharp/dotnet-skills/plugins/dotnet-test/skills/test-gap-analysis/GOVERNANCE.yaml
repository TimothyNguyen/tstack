name: test-gap-analysis
type: skill
status: stable
version: 1.0.0
owner: orchestrator
description: >-
  Performs pseudo-mutation analysis on production code in any language to find gaps in existing test suites. Use when
  the user asks to find weak tests, discover untested edge cases, check if tests would catch a bug, or evaluate test
  effectiveness through mutation-style reasoning. Analyzes production code for mutation points (boundaries, boolean
  flips, null/None/nil returns, exception/error removal, arithmetic changes) and checks whether tests would detect each
  mutation. Polyglot: .NET (MSTest/xUnit/NUnit/TUnit), Python (pytest/unittest), TS/JS (Jest/Vitest/Mocha/node:test),
  Java (JUnit/TestNG), Go, Ruby (RSpec/Minitest), Rust, Swift, Kotlin (JUnit/Kotest), PowerShell (Pester), C++
  (GoogleTest/Catch2). DO NOT USE FOR: writing new tests (use code-testing-agent, or writing-mstest-tests for MSTest),
  detecting anti-patterns (use test-anti-patterns), measuring assertion diversity (use assertion-quality), or running
  actual mutation testing tools (Stryker, mutmut, PIT, cargo-mutants).
dependencies:
  skills: []
  adapters: []
  tools: []
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
documentation:
  readme: true
  spec: true
  examples_min: 2
used_by: []
