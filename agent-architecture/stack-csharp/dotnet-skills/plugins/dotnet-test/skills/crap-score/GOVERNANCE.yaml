name: crap-score
type: skill
status: stable
version: 1.0.0
owner: orchestrator
description: >
  Calculates targeted CRAP (Change Risk Anti-Patterns) scores for a named .NET method, class, or single source file. Use
  when the user explicitly asks to compute CRAP scores or assess risky untested code for a specific target, combining
  Cobertura coverage data with cyclomatic complexity analysis. DO NOT USE FOR: project-wide coverage analysis, coverage
  plateau or "stuck coverage" diagnosis, what's blocking coverage, or where to add tests across a project (use
  coverage-analysis); writing tests; running tests without CRAP context.
