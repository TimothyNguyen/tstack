name: template-smart-defaults
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Applies cross-parameter default rules when creating .NET projects with dotnet new, filling gaps consistently without
  overriding values the user set explicitly. USE FOR: choosing sensible defaults for related parameters during project
  creation, resolving cross-parameter interactions (AOT implies a compatible framework, auth implies HTTPS, controllers
  excludes minimal-API flags), explaining why a default was applied. DO NOT USE FOR: creating the project itself (use
  template-instantiation), finding or comparing templates (use template-discovery and template-comparison), authoring or
  validating custom templates (use template-authoring and template-validation).
