name: template-discovery
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Helps find, inspect, and compare .NET project templates. Resolves natural-language project descriptions to ranked
  template matches with pre-filled parameters. USE FOR: finding the right dotnet new template for a task, comparing
  templates side by side, inspecting template parameters and constraints, understanding what a template produces before
  creating a project, resolving intent like "web API with auth" to concrete template + parameters. DO NOT USE FOR:
  actually creating projects (use template-instantiation), authoring custom templates (use template-authoring),
  comparing templates side by side in detail (use template-comparison), MSBuild or build issues (use dotnet-msbuild
  plugin), NuGet package management unrelated to template packages.
