name: target-authoring
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Canonical patterns for writing custom MSBuild targets. Only activate in MSBuild/.NET build context. USE FOR:
  diagnosing and fixing custom target authoring anti-patterns, reviewing MSBuild target definitions for correctness,
  diagnosing broken SDK target chains across files (e.g., Directory.Build.targets silently redefining SDK targets),
  fixing targets that replace CompileDependsOn instead of extending it with $(CompileDependsOn), fixing query targets
  that return stale results due to Outputs vs Returns misuse, fixing missing Inputs/Outputs causing unnecessary
  rebuilds, fixing missing FileWrites registration. Covers DependsOnTargets vs BeforeTargets vs AfterTargets, the
  Build→CoreBuild three-level pattern, hooking into the build pipeline, the $(XxxDependsOn) chain-extension pattern. DO
  NOT USE FOR: incremental build tuning (use incremental-build), parallelization (use build-parallelism), general
  anti-patterns (use msbuild-antipatterns), non-MSBuild build systems.
