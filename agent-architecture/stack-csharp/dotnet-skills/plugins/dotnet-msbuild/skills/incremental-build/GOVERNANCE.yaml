name: incremental-build
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Guide for optimizing MSBuild incremental builds. Only activate in MSBuild/.NET build context. USE FOR: builds slower
  than expected on subsequent runs, 'nothing changed but it rebuilds anyway', diagnosing why targets re-execute
  unnecessarily, fixing broken no-op builds. Covers 8 common causes: missing Inputs/Outputs on custom targets, volatile
  properties in output paths (timestamps/GUIDs), file writes outside tracked Outputs, missing FileWrites registration,
  glob changes, Visual Studio Fast Up-to-Date Check (FUTDC) issues. Key diagnostic: look for 'Building target
  completely' vs 'Skipping target' in binlog. DO NOT USE FOR: first-time build slowness (use build-perf-baseline),
  parallelism issues (use build-parallelism), evaluation-phase slowness (use eval-performance), non-MSBuild build
  systems. INVOKES: binlog MCP server tools (overview, search, target details); falls back to dotnet build /bl, binlog
  replay with diagnostic verbosity.
