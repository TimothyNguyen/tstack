name: eval-performance
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Guide for diagnosing and improving MSBuild project evaluation performance. Only activate in MSBuild/.NET build
  context. USE FOR: builds slow before any compilation starts, high evaluation time in binlog analysis, expensive glob
  patterns walking large directories (node_modules, .git, bin/obj), deep import chains (>20 levels), preprocessed output
  >10K lines indicating heavy evaluation, property functions with file I/O ($([System.IO.File]::ReadAllText(...))),
  multiple evaluations per project. Covers the 5 MSBuild evaluation phases, glob optimization via DefaultItemExcludes,
  import chain analysis with /pp preprocessing. DO NOT USE FOR: compilation-time slowness (use build-perf-diagnostics),
  incremental build issues (use incremental-build), non-MSBuild build systems. INVOKES: binlog MCP server tools
  (evaluations, evaluation_global_properties, evaluation_properties, imports, properties); falls back to dotnet msbuild
  -pp:full.xml for preprocessing, /clp:PerformanceSummary.
