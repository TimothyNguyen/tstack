name: build-perf-diagnostics
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Diagnose MSBuild build performance bottlenecks using binary log analysis. Only activate in MSBuild/.NET build context.
  USE FOR: identifying why builds are slow by analyzing binlog performance summaries, detecting ResolveAssemblyReference
  (RAR) taking >5s, Roslyn analyzers consuming >30% of Csc time, single targets dominating >50% of build time, node
  utilization below 80%, excessive Copy tasks, NuGet restore running every build. Covers timeline analysis, Target/Task
  Performance Summary interpretation, and 7 common bottleneck categories. Use after build-perf-baseline has established
  measurements. DO NOT USE FOR: establishing initial baselines (use build-perf-baseline first), fixing incremental build
  issues (use incremental-build), parallelism tuning (use build-parallelism), non-MSBuild build systems. INVOKES: binlog
  MCP server tools (overview, errors, search, items, properties); falls back to dotnet msbuild binlog replay + grep/cat
  when the MCP is unavailable.
