name: msbuild-modernization
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Guide for modernizing and migrating MSBuild project files to SDK-style format. Only activate in MSBuild/.NET build
  context. USE FOR: converting legacy .csproj/.vbproj with verbose XML to SDK-style, migrating packages.config to
  PackageReference, removing Properties/AssemblyInfo.cs in favor of auto-generation, eliminating explicit <Compile
  Include> lists via implicit globbing, consolidating shared settings into Directory.Build.props. Indicators of legacy
  projects: ToolsVersion attribute, <Import Project="$(MSBuildToolsPath)">, .csproj files > 50 lines for simple
  projects. DO NOT USE FOR: projects already in SDK-style format, non-.NET build systems (npm, Maven, CMake), .NET
  Framework projects that cannot move to SDK-style. INVOKES: dotnet try-convert, upgrade-assistant tools.
