name: commit
type: skill
status: stable
version: 0.1.1
owner: swe-agent
description: |
  Atomic commit discipline for any code change. Enforces Conventional Commits
  format, one-behavior-per-commit rule, and safe git operation sequences.
  Invoke via /commit, or when the user says "commit this", "make a commit",
  "how should I commit", "commit message", or asks about commit conventions,
  atomic commits, or git workflow after making changes.
dependencies:
  skills:
    - migration-review
    - release
    - seniorswe-concise
  adapters: []
  tools:
    - git
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
    - contract
documentation:
  readme: true
  spec: true
  examples_min: 3
used_by:
  - swe
  - migration
  - data
  - cloud
  - release-agent
governance_version: '1.0'
last_reviewed: '2026-06-28'

skill_metadata:
  agents: [swe, migration, data, cloud, release-agent]
  role: "Git workflow enforcement"

  commit_format:
    convention: "Conventional Commits"
    structure: "<type>[scope]: <description>"
    types:
      feat: "New capability (MINOR version bump)"
      fix: "Bug fix (PATCH version bump)"
      perf: "Performance improvement (PATCH)"
      refactor: "Restructure, no behavior change (no bump)"
      test: "Test suite changes"
      docs: "Documentation changes"
      chore: "Maintenance and cleanup"
      ci: "CI/CD configuration"

  atomic_commit_rules:
    one_behavior_per_commit: true
    no_accumulation: true
    each_commit_externally_describable: true
    diff_reads_like_story: true

  inputs:
    files:
      type: array
      description: "Files to stage and commit"
      required: true

    message:
      type: string
      description: "Commit message (conventional commits format)"
      required: true
      example: "fix: resolve token expiry check in auth middleware"

    amend:
      type: boolean
      description: "Amend previous commit instead of creating new"
      default: false

  outputs:
    commit_hash:
      type: string
      description: "Git commit SHA hash"

    commit_message:
      type: string
      description: "Actual commit message used"

    commit_history:
      type: array
      description: "Updated commit log"

integration:
  pre_requirements:
    git_repo_initialized: true
    git_user_configured: true
    git_signing_configured: false

  registration:
    skill_registry: true
    in_swe_agent: true
    in_release_agent: true

  wiring:
    git_available: true
    commit_hook_executable: true
    examples_working: true

  environment:
    requires_git: true
    requires_user_config: true

  safety_requirements:
    no_force_push: true
    no_no_verify: true
    no_no_gpg_sign: true
    rebase_sequence: "stage → commit → fetch → rebase → push"

quality:
  test_coverage: 92
  documentation_completeness: 100
  security_review_date: "2026-06-27"
  performance_tested: true
  error_cases_documented: true
  safety_critical: true

  conventional_commits_coverage: "All 8 types tested"

exceptions: []
deprecation: null
