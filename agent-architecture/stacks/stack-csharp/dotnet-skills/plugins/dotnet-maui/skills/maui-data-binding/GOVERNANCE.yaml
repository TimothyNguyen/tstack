name: maui-data-binding
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Guidance for .NET MAUI XAML and C# data bindings — compiled bindings, INotifyPropertyChanged / ObservableObject, value
  converters, binding modes, multi-binding, relative bindings, fallbacks, and MVVM best practices. USE FOR: setting up
  compiled bindings with x:DataType, implementing INotifyPropertyChanged or CommunityToolkit ObservableObject, creating
  IValueConverter / IMultiValueConverter, choosing binding modes, configuring BindingContext, relative bindings, binding
  fallbacks, StringFormat, code-behind SetBinding with lambdas, and enforcing XC0022/XC0025 warnings. DO NOT USE FOR:
  CollectionView item templates and layouts (use maui-collectionview), Shell navigation data passing (use
  maui-shell-navigation), dependency injection (use maui-dependency-injection), or animations triggered by property
  changes (use .NET MAUI animation APIs).
