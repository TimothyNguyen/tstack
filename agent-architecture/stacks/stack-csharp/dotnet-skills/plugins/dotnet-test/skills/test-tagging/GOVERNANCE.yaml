name: test-tagging
type: skill
status: stable
version: 1.0.0
owner: orchestrator
description: >-
  Analyzes test suites in any language and tags each test with a standardized set of traits (positive, negative,
  critical-path, boundary, smoke, regression, integration, performance, security). Use when the user wants to
  categorize, audit, or label tests with traits. Works with .NET (MSTest TestCategory / xUnit Trait / NUnit Category /
  TUnit Property), Python (pytest markers; unittest has no canonical tag syntax so report-only), TypeScript/JavaScript
  (Jest/Vitest test names, describe-block conventions), Java (JUnit 5 @Tag / TestNG groups), Go (subtest naming / build
  tags / file _test.go), Ruby (RSpec metadata), Rust (cargo test naming / cfg attributes), Swift (XCTest test plans /
  Swift Testing @Tag), Kotlin (JUnit @Tag / Kotest tags), PowerShell (Pester -Tag), C++ (GoogleTest filter prefixes /
  Catch2 [tags] / doctest decorators). Auto-edits when the framework has canonical syntax; falls back to report-only
  otherwise. Do not use for writing new tests, running tests, or migrating frameworks.
dependencies:
  skills: []
  adapters: []
  tools: []
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
