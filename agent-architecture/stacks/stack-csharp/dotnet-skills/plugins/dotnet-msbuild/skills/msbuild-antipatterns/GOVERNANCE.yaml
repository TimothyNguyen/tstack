name: msbuild-antipatterns
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Catalog of MSBuild anti-patterns with detection rules and fix recipes. Only activate in MSBuild/.NET build context.
  USE FOR: reviewing, auditing, or cleaning up .csproj, .vbproj, .fsproj, .props, .targets, or .proj files. Each
  anti-pattern has a symptom, explanation, and concrete BAD→GOOD transformation. Covers Exec-instead-of-built-in-task,
  unquoted conditions, hardcoded paths, restating SDK defaults, scattered package versions, and more. DO NOT USE FOR:
  non-MSBuild build systems (npm, Maven, CMake, etc.), project migration to SDK-style (use msbuild-modernization).
