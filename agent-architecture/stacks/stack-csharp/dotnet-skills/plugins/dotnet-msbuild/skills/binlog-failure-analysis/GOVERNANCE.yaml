name: binlog-failure-analysis
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >-
  Analyze MSBuild binary logs to diagnose build failures. Only activate in MSBuild/.NET build context. USE FOR: build
  errors that are unclear from console output, diagnosing cascading failures across multi-project builds, tracing
  MSBuild target execution order, and generally any MSBuild build issues. Requires an existing .binlog file. DO NOT USE
  FOR: generating binlogs (use binlog-generation), non-MSBuild build systems. INVOKES: binlog MCP server tools
  (overview, errors, search, items, properties); falls back to dotnet msbuild binlog replay + grep/cat when the MCP is
  unavailable.
