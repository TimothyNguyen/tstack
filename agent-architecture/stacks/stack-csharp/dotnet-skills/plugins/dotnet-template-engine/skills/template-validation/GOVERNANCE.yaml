name: template-validation
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Validates custom dotnet new templates for correctness before publishing. Catches missing fields, parameter bugs,
  shortName conflicts, constraint issues, and common authoring mistakes that cause templates to fail silently. USE FOR:
  checking template.json files for errors before publishing or testing, diagnosing why a template doesn't appear after
  installation, reviewing template parameter definitions for type mismatches and missing defaults, finding shortName
  conflicts with dotnet CLI commands, validating post-action and constraint configuration. DO NOT USE FOR: finding or
  using existing templates (use template-discovery), creating projects from templates (use template-instantiation),
  creating templates from existing projects (use template-authoring).
