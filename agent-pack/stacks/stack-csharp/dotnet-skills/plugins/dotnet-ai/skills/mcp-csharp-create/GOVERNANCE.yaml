name: mcp-csharp-create
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Create MCP servers using the C# SDK and .NET project templates. Covers scaffolding, tool/prompt/resource
  implementation, and transport configuration for stdio and HTTP. USE FOR: creating new MCP server projects, scaffolding
  with dotnet new mcpserver, adding MCP tools/prompts/resources, choosing stdio vs HTTP transport, configuring MCP
  hosting in Program.cs, setting up ASP.NET Core MCP endpoints with MapMcp. DO NOT USE FOR: debugging or running
  existing servers (use mcp-csharp-debug), writing tests (use mcp-csharp-test), publishing or deploying (use
  mcp-csharp-publish), building MCP clients, non-.NET MCP servers.
