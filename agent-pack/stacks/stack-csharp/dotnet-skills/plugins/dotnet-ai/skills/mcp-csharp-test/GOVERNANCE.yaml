name: mcp-csharp-test
type: skill
status: stable
version: 1.0.0
owner: orchestrator
description: >
  Test C# MCP servers at multiple levels: unit tests for individual tools and integration tests using the MCP client
  SDK. USE FOR: unit testing MCP tool methods, integration testing with in-memory MCP client/server, end-to-end testing
  via MCP protocol, testing HTTP MCP servers with WebApplicationFactory, mocking dependencies in tool tests, creating
  evaluations for MCP servers, writing eval questions, measuring tool quality. DO NOT USE FOR: testing MCP clients (this
  is server testing only), load or performance testing, testing non-.NET MCP servers, debugging server issues (use
  mcp-csharp-debug).
dependencies:
  skills: []
  adapters: []
  tools: []
  mcps: []
testing:
  coverage_target: 90
  types:
    - unit
    - integration
documentation:
  readme: true
  spec: true
  examples_min: 2
used_by: []
governance_version: '1.0'
last_reviewed: '2026-06-28'
