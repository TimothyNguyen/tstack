name: dotnet-webapi
type: skill
status: beta
version: 1.0.0
owner: orchestrator
description: >
  Guides creation and modification of ASP.NET Core Web API endpoints with correct HTTP semantics, OpenAPI metadata, and
  error handling. USE FOR: adding new API endpoints (controllers or minimal APIs), wiring up OpenAPI/Swagger, creating
  .http test files, setting up global error handling middleware. DO NOT USE FOR: general C# coding style, EF Core data
  access or query optimization (use optimizing-ef-core-queries), frontend/Blazor work, gRPC services, or SignalR hubs.
