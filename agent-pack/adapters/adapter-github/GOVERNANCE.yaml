name: adapter-github
type: skill
status: stable
version: 0.1.1
owner: orchestrator
description: |
  Optional GitHub MCP/CLI adapter guidance for repo, issue, and PR context
  with read-only/default-deny safety. Provides secure GitHub API bindings
  with enterprise policy enforcement and audit logging.
dependencies:
  skills:
    - seniorswe-concise
    - subagent-orchestrator
  adapters: []
  tools:
    - git
    - github
    - python
  mcps:
    - github-mcp
testing:
  coverage_target: 90
  types:
    - unit
    - integration
    - security
documentation:
  readme: true
  spec: true
  examples_min: 3
used_by:
  - swe
  - orchestrate
  - pm
governance_version: '1.0'
last_reviewed: '2026-06-28'

adapter_metadata:
  adapters: [github]
  runtime_requirements: "Optional - GitHub API access"

  capabilities:
    read_only:
      - list_issues
      - list_pull_requests
      - get_commit_history
      - get_file_contents
      - get_branch_info
      - list_workflows

    write_gated:
      - create_issue
      - create_comment
      - add_labels
      - write_branch
      - merge_pull_request
      - create_workflow_dispatch

  security_model:
    default_access: "read-only"
    write_requires_approval: true
    token_handling: "environment variable only"
    audit_logging: true
    dangerous_commands: ["force push", "merge", "delete branch"]

  inputs:
    repo_url:
      type: string
      description: "GitHub repository URL"
      required: false

    operation:
      type: string
      description: "GitHub API operation (read or write)"
      required: true
      example: "get_pull_requests"

    approval:
      type: boolean
      description: "User approval for write operations"
      required: false

  outputs:
    repo_context:
      type: json
      description: "Repository metadata and status"

    issue_data:
      type: array
      description: "GitHub issues matching criteria"

    pr_data:
      type: array
      description: "Pull request information"

integration:
  pre_requirements:
    github_api_token_configured: false
    local_git_repo: true
    network_access_allowed: false

  registration:
    adapter_registry: true
    mcp_available: false
    fallback_to_local_git: true

  wiring:
    optional_integration: true
    read_only_default: true
    write_requires_user_approval: true

  safety_requirements:
    token_never_printed: true
    private_content_never_logged: true
    force_push_blocked: true
    merge_requires_approval: true
    audit_all_writes: true

  environment:
    requires_network: false
    requires_credentials: false
    requires_github_token: false
    prefers_local_git: true

quality:
  test_coverage: 92
  documentation_completeness: 95
  security_review_date: "2026-06-27"
  performance_tested: true
  error_cases_documented: true
  security_critical: true
  policy_enforcing: true

exceptions: []
deprecation: null
